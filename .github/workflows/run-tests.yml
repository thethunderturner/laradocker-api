name: run-tests

on:
  push:
    paths:
      - '**.php'
      - '.github/workflows/run-tests.yml'
      - 'phpunit.xml.dist'
      - 'composer.json'
      - 'composer.lock'
  pull_request:
    paths:
      - '**.php'
      - '.github/workflows/run-tests.yml'
      - 'phpunit.xml.dist'
      - 'composer.json'
      - 'composer.lock'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest]
        php: [8.5, 8.4]
        laravel: [13.*, 12.*]
        stability: [prefer-lowest, prefer-stable]
        include:
          - laravel: 13.*
            testbench: 11.*
          - laravel: 12.*
            testbench: 10.*

    name: P${{ matrix.php }} - L${{ matrix.laravel }} - ${{ matrix.stability }} - ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo
          coverage: none

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: List Installed Dependencies
        run: composer show -D

      - name: Set up Docker
        uses: docker/setup-docker-action@v5
        with:
          channel: stable
          version: '29.5.0'

      - name: Get new Docker socket path
        id: docker-socket
        run: |
          SOCKET=$(docker context inspect setup-docker-action --format '{{.Endpoints.docker.Host}}' | sed 's|unix://||')
          echo "path=$SOCKET" >> $GITHUB_OUTPUT
          echo "Using socket: $SOCKET"
          echo "---"
          curl --silent --unix-socket "$SOCKET" http://localhost/version | head -c 300
          echo ""

      - name: Pre-pull test images
        env:
          DOCKER_HOST: unix://${{ steps.docker-socket.outputs.path }}
        run: docker pull alpine:latest

      - name: Execute tests
        env:
          DOCKER_SOCKET: ${{ steps.docker-socket.outputs.path }}
        run: vendor/bin/pest --ci
